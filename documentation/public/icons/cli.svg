<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
  <defs>
    <linearGradient id="g-cli" x1="0" x2="1">
      <stop offset="0" stop-color="#7b61ff"/>
      <stop offset="1" stop-color="#3ec6ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="transparent"/>
  <!-- Terminal window -->
  <rect x="8" y="10" width="48" height="44" rx="6" fill="url(#g-cli)" opacity="0.25"/>
  <rect x="8" y="10" width="48" height="10" rx="6" fill="url(#g-cli)" opacity="0.5"/>
  <rect x="8" y="16" width="48" height="4" fill="url(#g-cli)" opacity="0.5"/>
  <!-- Window dots -->
  <circle cx="15" cy="15" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="22" cy="15" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="29" cy="15" r="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Prompt chevron -->
  <path d="M16 30l6 5-6 5" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor line -->
  <line x1="26" y1="35" x2="44" y2="35" stroke="url(#g-cli)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Second line -->
  <line x1="26" y1="43" x2="38" y2="43" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
</svg>
