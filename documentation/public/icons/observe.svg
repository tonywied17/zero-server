<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
  <defs>
    <linearGradient id="g-obs" x1="0" x2="1">
      <stop offset="0" stop-color="#7b61ff"/>
      <stop offset="1" stop-color="#3ec6ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="transparent"/>
  <!-- Chart axes -->
  <line x1="12" y1="52" x2="12" y2="12" stroke="url(#g-obs)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="52" x2="52" y2="52" stroke="url(#g-obs)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Metrics line -->
  <polyline points="16,44 24,38 30,42 36,26 42,30 48,18" fill="none" stroke="url(#g-obs)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
