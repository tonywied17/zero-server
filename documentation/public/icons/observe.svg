  <circle cx="16" cy="44" r="2.5" fill="url(#g-obs)" opacity="0.8"/>
  <circle cx="36" cy="26" r="2.5" fill="url(#g-obs)" opacity="0.8"/>
  <circle cx="48" cy="18" r="2.5" fill="url(#g-obs)"/>
  <!-- Heartbeat pulse -->
  <polyline points="46,46 49,46 51,40 53,52 55,46 58,46" fill="none" stroke="url(#g-obs)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
