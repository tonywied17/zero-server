<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1114"/>
      <stop offset="50%" stop-color="#13161b"/>
      <stop offset="100%" stop-color="#0e1114"/>
    </linearGradient>
    <!-- Accent gradient (purple → cyan) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="50%" stop-color="#5865f2"/>
      <stop offset="100%" stop-color="#3ec6ff"/>
    </linearGradient>
    <linearGradient id="accent-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="50%" stop-color="#5865f2"/>
      <stop offset="100%" stop-color="#3ec6ff"/>
    </linearGradient>
    <!-- Logo gradients -->
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="50%" stop-color="#5865f2"/>
      <stop offset="100%" stop-color="#3ec6ff"/>
    </linearGradient>
    <linearGradient id="logo-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="logo-hi" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5865f2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e1114" stop-opacity="0"/>
    </radialGradient>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#5865f2" flood-opacity="0.35"/>
    </filter>
    <filter id="bolt-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Big ambient glow behind logo -->
    <radialGradient id="hero-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5865f2" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#5865f2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0e1114" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid line pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#5865f2" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <!-- Noise filter for texture -->
    <filter id="noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay"/>
    </filter>
    <!-- Text glow -->
    <filter id="text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#5865f2" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Divider line gradient -->
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7b61ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#5865f2" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#3ec6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3ec6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <circle cx="360" cy="280" r="320" fill="url(#hero-glow)"/>

  <!-- Decorative dots (orbital style) -->
  <circle cx="130" cy="120" r="4" fill="#7b61ff" opacity="0.4"/>
  <circle cx="1060" cy="520" r="4" fill="#3ec6ff" opacity="0.4"/>
  <circle cx="180" cy="500" r="3" fill="#5865f2" opacity="0.3"/>
  <circle cx="1020" cy="140" r="3" fill="#67e8f9" opacity="0.3"/>
  <circle cx="520" cy="80" r="2.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="900" cy="560" r="2.5" fill="#3ec6ff" opacity="0.25"/>

  <!-- Decorative scan lines -->
  <line x1="80" y1="560" x2="140" y2="580" stroke="#3ec6ff" stroke-width="1.5" opacity="0.1" stroke-linecap="round"/>
  <line x1="1040" y1="80" x2="1100" y2="100" stroke="#7b61ff" stroke-width="1.5" opacity="0.1" stroke-linecap="round"/>

  <!-- Logo (scaled & positioned left-center) -->
  <g transform="translate(165, 95) scale(0.85)">
    <circle cx="256" cy="256" r="200" fill="url(#bg-glow)"/>
    <circle cx="256" cy="256" r="195" fill="none" stroke="url(#logo-grad)" stroke-width="24" stroke-linecap="round" opacity="0.15"/>
    <circle cx="256" cy="256" r="170" fill="none" stroke="url(#logo-grad)" stroke-width="32" stroke-linecap="round" filter="url(#logo-shadow)"/>
    <path d="M 140,175 A 170,170 0 0,1 330,100" fill="none" stroke="url(#logo-hi)" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
    <g filter="url(#bolt-glow)">
      <path d="M 222 82 L 186 242 L 252 242 L 182 435 L 330 205 L 258 205 L 296 82 Z" fill="url(#logo-grad)"/>
      <path d="M 228 100 L 202 238 L 252 238 L 204 395 L 318 212 L 262 212 L 288 100 Z" fill="url(#logo-hi)" opacity="0.5"/>
    </g>
    <circle cx="100" cy="155" r="8" fill="#7b61ff" opacity="0.7"/>
    <circle cx="410" cy="360" r="8" fill="#3ec6ff" opacity="0.7"/>
    <circle cx="88" cy="330" r="5" fill="#5865f2" opacity="0.5"/>
    <circle cx="425" cy="170" r="5" fill="#67e8f9" opacity="0.5"/>
  </g>

  <!-- Title text -->
  <text x="620" y="235" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="white" filter="url(#text-glow)">zero-http</text>

  <!-- Divider line -->
  <line x1="620" y1="265" x2="1080" y2="265" stroke="url(#line-grad)" stroke-width="2"/>

  <!-- Tagline -->
  <text x="620" y="310" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#b0b8c4" letter-spacing="0.5">Zero-dependency backend framework</text>
  <text x="620" y="345" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#b0b8c4" letter-spacing="0.5">for Node.js</text>

  <!-- Feature pills -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">
    <!-- Row 1 -->
    <rect x="620" y="380" width="90" height="30" rx="6" fill="rgba(88,101,242,0.15)" stroke="rgba(88,101,242,0.3)" stroke-width="1"/>
    <text x="665" y="400" fill="#a78bfa" text-anchor="middle">Routing</text>

    <rect x="722" y="380" width="65" height="30" rx="6" fill="rgba(88,101,242,0.15)" stroke="rgba(88,101,242,0.3)" stroke-width="1"/>
    <text x="754.5" y="400" fill="#a78bfa" text-anchor="middle">ORM</text>

    <rect x="799" y="380" width="115" height="30" rx="6" fill="rgba(88,101,242,0.15)" stroke="rgba(88,101,242,0.3)" stroke-width="1"/>
    <text x="856.5" y="400" fill="#a78bfa" text-anchor="middle">WebSocket</text>

    <rect x="926" y="380" width="65" height="30" rx="6" fill="rgba(88,101,242,0.15)" stroke="rgba(88,101,242,0.3)" stroke-width="1"/>
    <text x="958.5" y="400" fill="#a78bfa" text-anchor="middle">SSE</text>

    <!-- Row 2 -->
    <rect x="620" y="420" width="115" height="30" rx="6" fill="rgba(62,198,255,0.1)" stroke="rgba(62,198,255,0.25)" stroke-width="1"/>
    <text x="677.5" y="440" fill="#67e8f9" text-anchor="middle">Middleware</text>

    <rect x="747" y="420" width="95" height="30" rx="6" fill="rgba(62,198,255,0.1)" stroke="rgba(62,198,255,0.25)" stroke-width="1"/>
    <text x="794.5" y="440" fill="#67e8f9" text-anchor="middle">Security</text>

    <rect x="854" y="420" width="120" height="30" rx="6" fill="rgba(62,198,255,0.1)" stroke="rgba(62,198,255,0.25)" stroke-width="1"/>
    <text x="914" y="440" fill="#67e8f9" text-anchor="middle">HTTP Client</text>
  </g>

  <!-- URL at bottom -->
  <text x="600" y="560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#5865f2" text-anchor="middle">z-http.com</text>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="url(#accent)" stroke-width="2" rx="0" opacity="0.15"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent-h)" opacity="0.6"/>
</svg>
